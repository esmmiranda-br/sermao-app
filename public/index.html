<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App de Sermões</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
    .container { max-width: 800px; margin: 20px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h1 { text-align: center; }
    form { display: flex; flex-direction: column; }
    input, textarea, button { margin: 10px 0; padding: 10px; box-sizing: border-box; font-size: 14px; }
    input[type="date"] { height: auto; line-height: 1.5; }
    textarea { resize: vertical; min-height: 100px; }
    button { background: #007bff; color: white; border: none; cursor: pointer; padding: 8px 12px; }
    button:hover { background: #0056b3; }
    .button-group { display: flex; gap: 5px; flex-wrap: wrap; }
    .button-group button { margin: 0; flex: 1; min-width: 80px; }
    .hidden { display: none; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
    .sermon-row { cursor: pointer; }
    .sermon-row:hover { background-color: #f9f9f9; }
    .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.4); }
    .modal-content { background-color: #fefefe; margin: 15% auto; padding: 20px; border: 1px solid #888; width: 80%; max-width: 600px; border-radius: 8px; }
    .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
    .close:hover { color: black; }

    /* Tamanhos de fonte para conteúdo */
    .font-small { font-size: 14px; }
    .font-medium { font-size: 16px; }
    .font-large { font-size: 18px; }

    /* Estilos para citações bíblicas */
    .bible-quote {
      background-color: #e8f4fd;
      border-left: 3px solid #2196F3;
      padding: 8px 12px;
      margin: 8px 0;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .bible-quote:hover {
      background-color: #d1e7dd;
    }
    .bible-quote strong {
      color: #1976D2;
    }

    /* Responsividade */
    @media (max-width: 768px) {
      .container { margin: 10px; padding: 15px; }
      table { font-size: 14px; }
      th, td { padding: 6px; }
      .modal-content { width: 90%; margin: 20% auto; }
    }

    @media (max-width: 480px) {
      .container { margin: 5px; padding: 10px; }
      h1 { font-size: 24px; }
      h2 { font-size: 20px; }
      input, textarea, button { font-size: 16px; }
      table { font-size: 12px; }
      th, td { padding: 4px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="login">
      <h1>Login</h1>
      <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Entrar</button>
      </form>
      <p id="loginError"></p>
    </div>

    <div id="dashboard" class="hidden">
      <h1>Gerenciar Sermões</h1>
      <button id="logout">Logout</button>
      <h2>Adicionar Sermão</h2>
      <form id="sermonForm">
        <input type="text" id="titulo" placeholder="Título" required>
        <textarea id="conteudo" placeholder="Conteúdo" required></textarea>
        <input type="date" id="data" required>
        <input type="text" id="local" placeholder="Local da ministração">
        <button type="submit">Salvar</button>
      </form>
      <h2>Sermões</h2>
      <table id="sermoesTable">
        <thead>
          <tr>
            <th>Título</th>
            <th>Data</th>
            <th>Local</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- Modal para visualizar conteúdo -->
  <div id="sermonModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 id="modalTitle"></h2>
      <p><strong>Data:</strong> <span id="modalDate"></span></p>
      <p><strong>Local:</strong> <span id="modalLocal"></span></p>
      <div style="margin-bottom: 10px;">
        <label for="fontSizeSelect">Tamanho da fonte:</label>
        <select id="fontSizeSelect">
          <option value="small">Pequeno</option>
          <option value="medium">Médio</option>
          <option value="large">Grande</option>
        </select>
      </div>
      <div id="modalContent"></div>
    </div>
  </div>

  <!-- Modal para visualizar texto bíblico -->
  <div id="bibleModal" class="modal">
    <div class="modal-content">
      <span class="close" id="bibleModalClose">&times;</span>
      <h2 id="bibleModalTitle">Texto Bíblico</h2>
      <div id="bibleContent">
        <p>Carregando...</p>
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;
    let token = localStorage.getItem('token');

    const loginDiv = document.getElementById('login');
    const dashboardDiv = document.getElementById('dashboard');
    const loginForm = document.getElementById('loginForm');
    const sermonForm = document.getElementById('sermonForm');
    const sermoesTable = document.getElementById('sermoesTable').querySelector('tbody');
    const logoutBtn = document.getElementById('logout');

    // Check if logged in
    if (token) {
      showDashboard();
      loadSermoes();
    }

    // Login
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
          token = data.token;
          localStorage.setItem('token', token);
          showDashboard();
          loadSermoes();
        } else {
          document.getElementById('loginError').textContent = data.error;
        }
      } catch (err) {
        console.error(err);
      }
    });

    // Logout
    logoutBtn.addEventListener('click', () => {
      token = null;
      localStorage.removeItem('token');
      showLogin();
    });

    // Add/Update sermon
    sermonForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const titulo = document.getElementById('titulo').value;
      const conteudo = document.getElementById('conteudo').value;
      const data = document.getElementById('data').value;
      const local = document.getElementById('local').value;
      const editId = sermonForm.dataset.editId;

      const method = editId ? 'PUT' : 'POST';
      const url = editId ? `${API_URL}/sermoes/${editId}` : `${API_URL}/sermoes`;

      try {
        const res = await fetch(url, {
          method,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ titulo, conteudo, data, local })
        });
        if (res.ok) {
          sermonForm.reset();
          delete sermonForm.dataset.editId;
          const submitBtn = sermonForm.querySelector('button[type="submit"]');
          submitBtn.textContent = 'Salvar';
          loadSermoes();
        } else {
          alert('Erro ao salvar');
        }
      } catch (err) {
        console.error(err);
      }
    });

    // Format date from YYYY-MM-DD to DD-MM-YYYY
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const [year, month, day] = dateStr.split('-');
      return `${day}/${month}/${year}`;
    }

    // Load sermons
    async function loadSermoes() {
      try {
        const res = await fetch(`${API_URL}/sermoes`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        sermoesTable.innerHTML = '';
        data.sermoes.forEach(sermon => {
          const row = document.createElement('tr');
          row.className = 'sermon-row';
          const formattedDate = formatDate(sermon.data);
          row.innerHTML = `
            <td>${sermon.titulo}</td>
            <td>${formattedDate}</td>
            <td>${sermon.local || ''}</td>
            <td class="button-group">
              <button class="edit-btn">Editar</button>
              <button class="delete-btn">Excluir</button>
            </td>
          `;
          
          // Editar button - não abre modal, só carrega form
          const editBtn = row.querySelector('.edit-btn');
          editBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            loadSermonForEdit(sermon.id);
          });
          
          // Deletar button
          const deleteBtn = row.querySelector('.delete-btn');
          deleteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            deleteSermon(sermon.id);
          });
          
          // View modal ao clicar na linha
          row.addEventListener('click', () => showSermonModal(sermon));
          sermoesTable.appendChild(row);
        });
      } catch (err) {
        console.error(err);
      }
    }

    // Load sermon for editing
    async function loadSermonForEdit(id) {
      try {
        const res = await fetch(`${API_URL}/sermoes/${id}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const sermon = await res.json();
        if (res.ok) {
          document.getElementById('titulo').value = sermon.titulo;
          document.getElementById('conteudo').value = sermon.conteudo;
          document.getElementById('data').value = sermon.data;
          document.getElementById('local').value = sermon.local || '';
          const submitBtn = sermonForm.querySelector('button[type="submit"]');
          submitBtn.textContent = 'Atualizar';
          sermonForm.dataset.editId = id;
          sermonForm.scrollIntoView({ behavior: 'smooth' });
        }
      } catch (err) {
        console.error(err);
      }
    }

    // Delete sermon
    async function deleteSermon(id) {
      if (confirm('Tem certeza que deseja excluir este sermão?')) {
        try {
          const res = await fetch(`${API_URL}/sermoes/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (res.ok) {
            alert('Sermão excluído com sucesso!');
            loadSermoes();
          }
        } catch (err) {
          console.error(err);
          alert('Erro ao excluir sermão');
        }
      }
    }

    // Show sermon modal
    function showSermonModal(sermon) {
      const formattedDate = formatDate(sermon.data);
      document.getElementById('modalTitle').textContent = sermon.titulo;
      document.getElementById('modalDate').textContent = formattedDate;
      document.getElementById('modalLocal').textContent = sermon.local || 'Não informado';
      document.getElementById('modalContent').innerHTML = '<p><strong>Conteúdo:</strong></p><p>' + processBibleQuotes(sermon.conteudo.replace(/\n/g, '<br>')) + '</p>';
      document.getElementById('sermonModal').style.display = 'block';
    }

    // Close modal
    document.querySelector('.close').addEventListener('click', () => {
      document.getElementById('sermonModal').style.display = 'none';
    });

    window.addEventListener('click', (event) => {
      if (event.target == document.getElementById('sermonModal')) {
        document.getElementById('sermonModal').style.display = 'none';
      }
    });

    function showLogin() {
      loginDiv.classList.remove('hidden');
      dashboardDiv.classList.add('hidden');
    }

    function showDashboard() {
      loginDiv.classList.add('hidden');
      dashboardDiv.classList.remove('hidden');
    }

    // Controle de tamanho de fonte
    const fontSizeSelect = document.getElementById('fontSizeSelect');
    const modalContent = document.getElementById('modalContent');

    // Carregar preferência salva
    const savedFontSize = localStorage.getItem('fontSize') || 'medium';
    fontSizeSelect.value = savedFontSize;
    applyFontSize(savedFontSize);

    // Aplicar tamanho de fonte
    function applyFontSize(size) {
      modalContent.classList.remove('font-small', 'font-medium', 'font-large');
      modalContent.classList.add(`font-${size}`);
    }

    // Event listener para mudança de tamanho
    fontSizeSelect.addEventListener('change', (e) => {
      const selectedSize = e.target.value;
      applyFontSize(selectedSize);
      localStorage.setItem('fontSize', selectedSize);
    });

    // Função para detectar citações bíblicas
    function detectBibleQuotes(text) {
      // Padrões comuns de citações bíblicas em português
      const patterns = [
        // Livros completos: Gênesis, Êxodo, etc.
        /\b(Gênesis|Êxodo|Levítico|Números|Deuteronômio|Josué|Juízes|Rute|1 Samuel|2 Samuel|1 Reis|2 Reis|1 Crônicas|2 Crônicas|Esdras|Neemias|Ester|Jó|Salmos|Provérbios|Eclesiastes|Cânticos|Isaías|Jeremias|Lamentações|Ezequiel|Daniel|Oséias|Joel|Amós|Obadias|Jonas|Miquéias|Naum|Habacuque|Sofonias|Ageu|Zacarias|Malaquias|Mateus|Marcos|Lucas|João|Atos|Romanos|1 Coríntios|2 Coríntios|Gálatas|Efésios|Filipenses|Colossenses|1 Tessalonicenses|2 Tessalonicenses|1 Timóteo|2 Timóteo|Tito|Filemom|Hebreus|Tiago|1 Pedro|2 Pedro|1 João|2 João|3 João|Judas|Apocalipse)\s+(\d+)(?::(\d+)(?:-(\d+))?)?/gi,
        // Abreviações comuns: Gn, Ex, etc.
        /\b(Gn|Ex|Lv|Nm|Dt|Js|Jz|Rt|1Sm|2Sm|1Rs|2Rs|1Cr|2Cr|Ed|Ne|Et| Jó|Sl|Pv|Ec|Ct|Is|Jr|Lm|Ez|Dn|Os|Jl|Am|Ob|Jn|Mq|Na|Hb| Sf|Ag|Zc|Ml|Mt|Mc|Lc|Jo|At|Rm|1Co|2Co|Gl|Ef|Fp|Cl|1Ts|2Ts|1Tm|2Tm|Tt|Fm|Hb|Tg|1Pe|2Pe|1Jo|2Jo|3Jo|Jd|Ap)\s+(\d+)(?::(\d+)(?:-(\d+))?)?/gi
      ];

      const quotes = [];
      patterns.forEach(pattern => {
        let match;
        while ((match = pattern.exec(text)) !== null) {
          const book = match[1];
          const chapter = match[2];
          const verse = match[3];
          const endVerse = match[4];

          quotes.push({
            book: book,
            chapter: parseInt(chapter),
            verse: verse ? parseInt(verse) : null,
            endVerse: endVerse ? parseInt(endVerse) : null,
            fullMatch: match[0],
            index: match.index
          });
        }
      });

      return quotes;
    }

    // Função para buscar texto bíblico (usando API externa)
    async function fetchBibleText(book, chapter, verse, endVerse) {
      try {
        // Usando API da American Bible Society (NIV em inglês)
        const bookMap = {
          'Gênesis': 'Gen', 'Êxodo': 'Exod', 'Levítico': 'Lev', 'Números': 'Num',
          'Deuteronômio': 'Deut', 'Josué': 'Josh', 'Juízes': 'Judg', 'Rute': 'Ruth',
          '1 Samuel': '1Sam', '2 Samuel': '2Sam', '1 Reis': '1Kgs', '2 Reis': '2Kgs',
          '1 Crônicas': '1Chr', '2 Crônicas': '2Chr', 'Esdras': 'Ezra', 'Neemias': 'Neh',
          'Ester': 'Esth', 'Jó': 'Job', 'Salmos': 'Ps', 'Provérbios': 'Prov',
          'Eclesiastes': 'Eccl', 'Cânticos': 'Song', 'Isaías': 'Isa', 'Jeremias': 'Jer',
          'Lamentações': 'Lam', 'Ezequiel': 'Ezek', 'Daniel': 'Dan', 'Oséias': 'Hos',
          'Joel': 'Joel', 'Amós': 'Amos', 'Obadias': 'Obad', 'Jonas': 'Jonah',
          'Miquéias': 'Mic', 'Naum': 'Nah', 'Habacuque': 'Hab', 'Sofonias': 'Zeph',
          'Ageu': 'Hag', 'Zacarias': 'Zech', 'Malaquias': 'Mal', 'Mateus': 'Matt',
          'Marcos': 'Mark', 'Lucas': 'Luke', 'João': 'John', 'Atos': 'Acts',
          'Romanos': 'Rom', '1 Coríntios': '1Cor', '2 Coríntios': '2Cor', 'Gálatas': 'Gal',
          'Efésios': 'Eph', 'Filipenses': 'Phil', 'Colossenses': 'Col',
          '1 Tessalonicenses': '1Thess', '2 Tessalonicenses': '2Thess', '1 Timóteo': '1Tim',
          '2 Timóteo': '2Tim', 'Tito': 'Titus', 'Filemom': 'Phlm', 'Hebreus': 'Heb',
          'Tiago': 'Jas', '1 Pedro': '1Pet', '2 Pedro': '2Pet', '1 João': '1John',
          '2 João': '2John', '3 João': '3John', 'Judas': 'Jude', 'Apocalipse': 'Rev'
        };

        const bookAbbrev = bookMap[book];
        if (!bookAbbrev) {
          return 'Livro não encontrado no mapeamento.';
        }

        const passage = endVerse ? `${bookAbbrev}+${chapter}:${verse}-${endVerse}` : `${bookAbbrev}+${chapter}:${verse}`;
        const url = `https://labs.bible.org/api/?passage=${passage}&type=json`;

        const response = await fetch(url);
        const data = await response.json();

        if (!Array.isArray(data) || data.length === 0) {
          return 'Texto não encontrado ou erro na API.';
        }

        // Combinar todos os versículos em um texto único
        const text = data.map(verse => `${verse.verse}. ${verse.text}`).join(' ');

        return text || 'Texto não encontrado';
      } catch (error) {
        console.error('Erro ao buscar texto bíblico:', error);
        return 'Erro ao carregar texto bíblico. Tente novamente.';
      }
    }

    // Função para processar conteúdo e adicionar citações clicáveis
    function processBibleQuotes(content) {
      const quotes = detectBibleQuotes(content);
      let processedContent = content;
      let offset = 0;

      quotes.forEach(quote => {
        const beforeQuote = processedContent.substring(0, quote.index + offset);
        const afterQuote = processedContent.substring(quote.index + offset + quote.fullMatch.length);
        const quoteHtml = `<span class="bible-quote" data-book="${quote.book}" data-chapter="${quote.chapter}" data-verse="${quote.verse}" data-end-verse="${quote.endVerse || ''}"><strong>${quote.fullMatch}</strong> 📖</span>`;

        processedContent = beforeQuote + quoteHtml + afterQuote;
        offset += quoteHtml.length - quote.fullMatch.length;
      });

      return processedContent;
    }

    // Event listener para citações bíblicas
    document.addEventListener('click', async (e) => {
      if (e.target.classList.contains('bible-quote') || e.target.closest('.bible-quote')) {
        const quoteElement = e.target.classList.contains('bible-quote') ? e.target : e.target.closest('.bible-quote');
        const book = quoteElement.dataset.book;
        const chapter = quoteElement.dataset.chapter;
        const verse = quoteElement.dataset.verse;
        const endVerse = quoteElement.dataset.endVerse;

        // Mostrar modal de carregamento
        document.getElementById('bibleModalTitle').textContent = `${book} ${chapter}:${verse}${endVerse ? `-${endVerse}` : ''} (NVI)`;
        document.getElementById('bibleContent').innerHTML = '<p>Carregando texto bíblico...</p>';
        document.getElementById('bibleModal').style.display = 'block';

        // Buscar texto
        const bibleText = await fetchBibleText(book, chapter, verse, endVerse);
        document.getElementById('bibleContent').innerHTML = `<p>${bibleText}</p>`;
      }
    });

    // Fechar modal bíblico
    document.getElementById('bibleModalClose').addEventListener('click', () => {
      document.getElementById('bibleModal').style.display = 'none';
    });

    window.addEventListener('click', (event) => {
      if (event.target == document.getElementById('bibleModal')) {
        document.getElementById('bibleModal').style.display = 'none';
      }
    });
  </script>
</body>
</html>
