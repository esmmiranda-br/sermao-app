<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App de Sermões</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="min-h-screen flex items-center justify-center bg-gray-100">
    <div class="w-full max-w-2xl mx-auto p-6 bg-white rounded-xl shadow-lg">
      <div id="login">
        <h1 class="text-3xl font-bold text-center mb-6 text-blue-700">Login</h1>
        <form id="loginForm" class="flex flex-col gap-4">
          <input type="text" id="username" placeholder="Username" required class="border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
          <input type="password" id="password" placeholder="Password" required class="border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
          <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded transition">Entrar</button>
        </form>
        <p id="loginError" class="text-red-600 mt-2"></p>
      </div>

      <div id="dashboard" class="hidden">
        <div class="flex justify-between items-center mb-4">
          <h1 class="text-2xl font-bold text-blue-700">Gerenciar Sermões</h1>
          <button id="logout" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded">Logout</button>
        </div>
        <h2 class="text-xl font-semibold mb-2">Adicionar Sermão</h2>
        <form id="sermonForm" class="flex flex-col gap-3 mb-6">
          <input type="text" id="titulo" placeholder="Título" required class="border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
          <textarea id="conteudo" placeholder="Conteúdo" required class="border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 min-h-[100px]"></textarea>
          <input type="date" id="data" required class="border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
          <input type="text" id="local" placeholder="Local da ministração" class="border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
          <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded transition">Salvar</button>
        </form>
        <h2 class="text-xl font-semibold mb-2">Sermões</h2>
        <div class="overflow-x-auto">
          <table id="sermoesTable" class="min-w-full bg-white border border-gray-200 rounded-lg overflow-hidden">
            <thead>
              <tr class="bg-blue-100">
                <th class="py-2 px-3 text-left">Título</th>
                <th class="py-2 px-3 text-left">Data</th>
                <th class="py-2 px-3 text-left">Local</th>
                <th class="py-2 px-3 text-left">Ações</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
  </div>

  <!-- Modal para visualizar conteúdo -->
  <div id="sermonModal" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-white hidden overflow-auto">
    <div class="w-full max-w-2xl mx-auto p-6 relative flex flex-col min-h-screen">
      <button id="closeSermonModal" class="absolute top-4 left-4 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">Voltar</button>
      <h2 id="modalTitle" class="text-2xl font-bold mb-4 text-left mt-12"></h2>
      <div class="flex flex-col gap-2 mb-4 text-left">
        <div><span class="font-semibold text-gray-700">Data:</span> <span id="modalDate" class="text-gray-800"></span></div>
        <div><span class="font-semibold text-gray-700">Local:</span> <span id="modalLocal" class="text-gray-800"></span></div>
      </div>
      <div class="flex items-center gap-2 mb-4">
        <label for="fontSizeSelect" class="font-semibold text-gray-700">Tamanho da fonte:</label>
        <select id="fontSizeSelect" class="border rounded px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="small">Pequeno</option>
          <option value="medium">Médio</option>
          <option value="large">Grande</option>
        </select>
      </div>
      <div id="modalContent" class="flex-1 overflow-y-auto"></div>
    </div>
  </div>

  <!-- Modal para visualizar texto bíblico -->
  <div id="bibleModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-40 hidden">
    <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-xl relative">
      <span class="close absolute top-2 right-4 text-2xl text-gray-400 hover:text-black cursor-pointer" id="bibleModalClose">&times;</span>
      <h2 id="bibleModalTitle" class="text-xl font-bold mb-2">Texto Bíblico</h2>
      <div id="bibleContent">
        <p>Carregando...</p>
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;
    let token = localStorage.getItem('token');

    const loginDiv = document.getElementById('login');
    const dashboardDiv = document.getElementById('dashboard');
    const loginForm = document.getElementById('loginForm');
    const sermonForm = document.getElementById('sermonForm');
    const sermoesTable = document.getElementById('sermoesTable').querySelector('tbody');
    const logoutBtn = document.getElementById('logout');

    // Check if logged in
    if (token) {
      showDashboard();
      loadSermoes();
    }

    // Login
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
          token = data.token;
          localStorage.setItem('token', token);
          showDashboard();
          loadSermoes();
        } else {
          document.getElementById('loginError').textContent = data.error;
        }
      } catch (err) {
        console.error(err);
      }
    });

    // Logout
    logoutBtn.addEventListener('click', () => {
      token = null;
      localStorage.removeItem('token');
      showLogin();
    });

    // Add/Update sermon
    sermonForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const titulo = document.getElementById('titulo').value;
      const conteudo = document.getElementById('conteudo').value;
      const data = document.getElementById('data').value;
      const local = document.getElementById('local').value;
      const editId = sermonForm.dataset.editId;

      const method = editId ? 'PUT' : 'POST';
      const url = editId ? `${API_URL}/sermoes/${editId}` : `${API_URL}/sermoes`;

      try {
        const res = await fetch(url, {
          method,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ titulo, conteudo, data, local })
        });
        if (res.ok) {
          sermonForm.reset();
          delete sermonForm.dataset.editId;
          const submitBtn = sermonForm.querySelector('button[type="submit"]');
          submitBtn.textContent = 'Salvar';
          loadSermoes();
        } else {
          alert('Erro ao salvar');
        }
      } catch (err) {
        console.error(err);
      }
    });

    // Format date from YYYY-MM-DD to DD-MM-YYYY
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const [year, month, day] = dateStr.split('-');
      return `${day}/${month}/${year}`;
    }

    // Load sermons
    async function loadSermoes() {
      try {
        const res = await fetch(`${API_URL}/sermoes`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        sermoesTable.innerHTML = '';
        data.sermoes.forEach(sermon => {
          const row = document.createElement('tr');
          row.className = 'sermon-row';
          const formattedDate = formatDate(sermon.data);
          row.innerHTML = `
            <td>${sermon.titulo}</td>
            <td>${formattedDate}</td>
            <td>${sermon.local || ''}</td>
            <td class="button-group">
              <button class="edit-btn">Editar</button>
              <button class="delete-btn">Excluir</button>
            </td>
          `;
          
          // Editar button - não abre modal, só carrega form
          const editBtn = row.querySelector('.edit-btn');
          editBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            loadSermonForEdit(sermon.id);
          });
          
          // Deletar button
          const deleteBtn = row.querySelector('.delete-btn');
          deleteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            deleteSermon(sermon.id);
          });
          
          // View modal ao clicar na linha
          row.addEventListener('click', () => showSermonModal(sermon));
          sermoesTable.appendChild(row);
        });
      } catch (err) {
        console.error(err);
      }
    }

    // Load sermon for editing
    async function loadSermonForEdit(id) {
      try {
        const res = await fetch(`${API_URL}/sermoes/${id}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const sermon = await res.json();
        if (res.ok) {
          document.getElementById('titulo').value = sermon.titulo;
          document.getElementById('conteudo').value = sermon.conteudo;
          document.getElementById('data').value = sermon.data;
          document.getElementById('local').value = sermon.local || '';
          const submitBtn = sermonForm.querySelector('button[type="submit"]');
          submitBtn.textContent = 'Atualizar';
          sermonForm.dataset.editId = id;
          sermonForm.scrollIntoView({ behavior: 'smooth' });
        }
      } catch (err) {
        console.error(err);
      }
    }

    // Delete sermon
    async function deleteSermon(id) {
      if (confirm('Tem certeza que deseja excluir este sermão?')) {
        try {
          const res = await fetch(`${API_URL}/sermoes/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (res.ok) {
            alert('Sermão excluído com sucesso!');
            loadSermoes();
          }
        } catch (err) {
          console.error(err);
          alert('Erro ao excluir sermão');
        }
      }
    }

    // Show sermon modal
    function showSermonModal(sermon) {
      const formattedDate = formatDate(sermon.data);
      document.getElementById('modalTitle').textContent = sermon.titulo;
      document.getElementById('modalDate').textContent = formattedDate;
      document.getElementById('modalLocal').textContent = sermon.local || 'Não informado';
      document.getElementById('modalContent').innerHTML = '<p class="mb-2 font-semibold">Conteúdo:</p><p>' + processBibleQuotes(sermon.conteudo.replace(/\n/g, '<br>')) + '</p>';
      document.getElementById('sermonModal').classList.remove('hidden');
      loginDiv.classList.add('hidden');
      dashboardDiv.classList.add('hidden');
    }

    // Close modal
    document.getElementById('closeSermonModal').addEventListener('click', () => {
      document.getElementById('sermonModal').classList.add('hidden');
      // Volta para a tela principal
      if (token) {
        showDashboard();
      } else {
        showLogin();
      }
    });

    window.addEventListener('click', (event) => {
      if (event.target == document.getElementById('sermonModal')) {
        document.getElementById('sermonModal').classList.add('hidden');
      }
    });

    function showLogin() {
      loginDiv.classList.remove('hidden');
      dashboardDiv.classList.add('hidden');
    }

    function showDashboard() {
      loginDiv.classList.add('hidden');
      dashboardDiv.classList.remove('hidden');
    }

    // Controle de tamanho de fonte
    const fontSizeSelect = document.getElementById('fontSizeSelect');
    const modalContent = document.getElementById('modalContent');

    // Carregar preferência salva
    const savedFontSize = localStorage.getItem('fontSize') || 'medium';
    fontSizeSelect.value = savedFontSize;
    applyFontSize(savedFontSize);

    // Aplicar tamanho de fonte
    function applyFontSize(size) {
      modalContent.classList.remove('font-small', 'font-medium', 'font-large');
      modalContent.classList.add(`font-${size}`);
    }

    // Event listener para mudança de tamanho
    fontSizeSelect.addEventListener('change', (e) => {
      const selectedSize = e.target.value;
      applyFontSize(selectedSize);
      localStorage.setItem('fontSize', selectedSize);
    });

    // Função para detectar citações bíblicas
    function detectBibleQuotes(text) {
      // Padrões comuns de citações bíblicas em português
      const patterns = [
        // Livros completos: Gênesis, Êxodo, etc.
        /\b(Gênesis|Êxodo|Levítico|Números|Deuteronômio|Josué|Juízes|Rute|1 Samuel|2 Samuel|1 Reis|2 Reis|1 Crônicas|2 Crônicas|Esdras|Neemias|Ester|Jó|Salmos|Provérbios|Eclesiastes|Cânticos|Isaías|Jeremias|Lamentações|Ezequiel|Daniel|Oséias|Joel|Amós|Obadias|Jonas|Miquéias|Naum|Habacuque|Sofonias|Ageu|Zacarias|Malaquias|Mateus|Marcos|Lucas|João|Atos|Romanos|1 Coríntios|2 Coríntios|Gálatas|Efésios|Filipenses|Colossenses|1 Tessalonicenses|2 Tessalonicenses|1 Timóteo|2 Timóteo|Tito|Filemom|Hebreus|Tiago|1 Pedro|2 Pedro|1 João|2 João|3 João|Judas|Apocalipse)\s+(\d+)(?::(\d+)(?:-(\d+))?)?/gi,
        // Abreviações comuns: Gn, Ex, etc.
        /\b(Gn|Ex|Lv|Nm|Dt|Js|Jz|Rt|1Sm|2Sm|1Rs|2Rs|1Cr|2Cr|Ed|Ne|Et| Jó|Sl|Pv|Ec|Ct|Is|Jr|Lm|Ez|Dn|Os|Jl|Am|Ob|Jn|Mq|Na|Hb| Sf|Ag|Zc|Ml|Mt|Mc|Lc|Jo|At|Rm|1Co|2Co|Gl|Ef|Fp|Cl|1Ts|2Ts|1Tm|2Tm|Tt|Fm|Hb|Tg|1Pe|2Pe|1Jo|2Jo|3Jo|Jd|Ap)\s+(\d+)(?::(\d+)(?:-(\d+))?)?/gi
      ];

      const quotes = [];
      patterns.forEach(pattern => {
        let match;
        while ((match = pattern.exec(text)) !== null) {
          const book = match[1];
          const chapter = match[2];
          const verse = match[3];
          const endVerse = match[4];

          quotes.push({
            book: book,
            chapter: parseInt(chapter),
            verse: verse ? parseInt(verse) : null,
            endVerse: endVerse ? parseInt(endVerse) : null,
            fullMatch: match[0],
            index: match.index
          });
        }
      });

      return quotes;
    }

    // Carregar a bíblia em português (NVI) do arquivo local
    let bibliaNVI = null;
    async function loadBibliaNVI() {
      if (bibliaNVI) return bibliaNVI;
      try {
        const res = await fetch('pt_nvi.json');
        bibliaNVI = await res.json();
        return bibliaNVI;
      } catch (error) {
        console.error('Erro ao carregar a Bíblia NVI:', error);
        return null;
      }
    }

    // Mapeamento de nomes de livros para o JSON (ajuste conforme necessário)
    const livroMap = {
      // Pentateuco
      'Gênesis': 'Gênesis', 'Gn': 'Gênesis',
      'Êxodo': 'Êxodo', 'Ex': 'Êxodo',
      'Levítico': 'Levítico', 'Lv': 'Levítico',
      'Números': 'Números', 'Nm': 'Números',
      'Deuteronômio': 'Deuteronômio', 'Dt': 'Deuteronômio',
      // Históricos
      'Josué': 'Josué', 'Js': 'Josué',
      'Juízes': 'Juízes', 'Jz': 'Juízes',
      'Rute': 'Rute', 'Rt': 'Rute',
      '1 Samuel': '1 Samuel', '1Sm': '1 Samuel',
      '2 Samuel': '2 Samuel', '2Sm': '2 Samuel',
      '1 Reis': '1 Reis', '1Rs': '1 Reis',
      '2 Reis': '2 Reis', '2Rs': '2 Reis',
      '1 Crônicas': '1 Crônicas', '1Cr': '1 Crônicas',
      '2 Crônicas': '2 Crônicas', '2Cr': '2 Crônicas',
      'Esdras': 'Esdras', 'Ed': 'Esdras',
      'Neemias': 'Neemias', 'Ne': 'Neemias',
      'Ester': 'Ester', 'Et': 'Ester',
      // Poéticos
      'Jó': 'Jó', 'Jó': 'Jó',
      'Salmos': 'Salmos', 'Sl': 'Salmos',
      'Provérbios': 'Provérbios', 'Pv': 'Provérbios',
      'Eclesiastes': 'Eclesiastes', 'Ec': 'Eclesiastes',
      'Cânticos': 'Cânticos', 'Ct': 'Cânticos',
      // Profetas Maiores
      'Isaías': 'Isaías', 'Is': 'Isaías',
      'Jeremias': 'Jeremias', 'Jr': 'Jeremias',
      'Lamentações': 'Lamentações', 'Lm': 'Lamentações',
      'Ezequiel': 'Ezequiel', 'Ez': 'Ezequiel',
      'Daniel': 'Daniel', 'Dn': 'Daniel',
      // Profetas Menores
      'Oséias': 'Oséias', 'Os': 'Oséias',
      'Joel': 'Joel', 'Jl': 'Joel',
      'Amós': 'Amós', 'Am': 'Amós',
      'Obadias': 'Obadias', 'Ob': 'Obadias',
      'Jonas': 'Jonas', 'Jn': 'Jonas',
      'Miquéias': 'Miquéias', 'Mq': 'Miquéias',
      'Naum': 'Naum', 'Na': 'Naum',
      'Habacuque': 'Habacuque', 'Hc': 'Habacuque',
      'Sofonias': 'Sofonias', 'Sf': 'Sofonias',
      'Ageu': 'Ageu', 'Ag': 'Ageu',
      'Zacarias': 'Zacarias', 'Zc': 'Zacarias',
      'Malaquias': 'Malaquias', 'Ml': 'Malaquias',
      // Evangelhos e Atos
      'Mateus': 'Mateus', 'Mt': 'Mateus',
      'Marcos': 'Marcos', 'Mc': 'Marcos',
      'Lucas': 'Lucas', 'Lc': 'Lucas',
      'João': 'João', 'Jo': 'João', 'Jo.': 'João',
      'Atos': 'Atos', 'At': 'Atos',
      // Cartas Paulinas
      'Romanos': 'Romanos', 'Rm': 'Romanos',
      '1 Coríntios': '1 Coríntios', '1Co': '1 Coríntios',
      '2 Coríntios': '2 Coríntios', '2Co': '2 Coríntios',
      'Gálatas': 'Gálatas', 'Gl': 'Gálatas',
      'Efésios': 'Efésios', 'Ef': 'Efésios',
      'Filipenses': 'Filipenses', 'Fp': 'Filipenses',
      'Colossenses': 'Colossenses', 'Cl': 'Colossenses',
      '1 Tessalonicenses': '1 Tessalonicenses', '1Ts': '1 Tessalonicenses',
      '2 Tessalonicenses': '2 Tessalonicenses', '2Ts': '2 Tessalonicenses',
      '1 Timóteo': '1 Timóteo', '1Tm': '1 Timóteo',
      '2 Timóteo': '2 Timóteo', '2Tm': '2 Timóteo',
      'Tito': 'Tito', 'Tt': 'Tito',
      'Filemom': 'Filemom', 'Fm': 'Filemom',
      // Cartas Gerais
      'Hebreus': 'Hebreus', 'Hb': 'Hebreus',
      'Tiago': 'Tiago', 'Tg': 'Tiago',
      '1 Pedro': '1 Pedro', '1Pe': '1 Pedro',
      '2 Pedro': '2 Pedro', '2Pe': '2 Pedro',
      '1 João': '1 João', '1Jo': '1 João',
      '2 João': '2 João', '2Jo': '2 João',
      '3 João': '3 João', '3Jo': '3 João',
      'Judas': 'Judas', 'Jd': 'Judas',
      'Apocalipse': 'Apocalipse', 'Ap': 'Apocalipse'
    };

    // Função para buscar texto bíblico do arquivo local
    async function fetchBibleText(book, chapter, verse, endVerse) {
      try {
        const biblia = await loadBibliaNVI();
        if (!biblia) return 'Erro ao carregar a Bíblia.';
        // Normaliza o nome do livro: remove pontos, espaços extras e deixa minúsculo
        let bookKey = book.replace(/\./g, '').replace(/\s+/g, ' ').trim().toLowerCase();
        // Procura no mapeamento de forma insensível a maiúsculas
        let livroNome = null;
        for (const [k, v] of Object.entries(livroMap)) {
          if (k.replace(/\./g, '').replace(/\s+/g, ' ').trim().toLowerCase() === bookKey) {
            livroNome = v;
            break;
          }
        }
        if (!livroNome) livroNome = book;
        // Busca por abreviação ou nome completo
        let livro = biblia.find(l =>
          l.abbrev.toLowerCase() === bookKey ||
          (l.nome && l.nome.toLowerCase() === livroNome.toLowerCase())
        );
        // Se não encontrar pelo nome, tenta pelo campo 'name' (alguns JSONs usam 'name' ao invés de 'nome')
        if (!livro) {
          livro = biblia.find(l =>
            (l.name && l.name.toLowerCase() === livroNome.toLowerCase())
          );
        }
        if (!livro) return 'Livro não encontrado.';
        // Capítulos
        const cap = livro.chapters[parseInt(chapter) - 1];
        if (!cap) return 'Capítulo não encontrado.';
        const startVerse = verse ? parseInt(verse) : 1;
        const end = endVerse ? parseInt(endVerse) : startVerse;
        const versos = cap.slice(startVerse - 1, end);
        if (!versos || versos.length === 0) return 'Versículo não encontrado.';
        // Monta o texto
        let text = '';
        for (let i = 0; i < versos.length; i++) {
          text += `${startVerse + i}. ${versos[i]} `;
        }
        return text.trim();
      } catch (error) {
        console.error('Erro ao buscar texto bíblico:', error);
        return 'Erro ao carregar texto bíblico. Tente novamente.';
      }
    }

    // Função para processar conteúdo e adicionar citações clicáveis
    function processBibleQuotes(content) {
      const quotes = detectBibleQuotes(content);
      let processedContent = content;
      let offset = 0;

      quotes.forEach(quote => {
        const beforeQuote = processedContent.substring(0, quote.index + offset);
        const afterQuote = processedContent.substring(quote.index + offset + quote.fullMatch.length);
        const quoteHtml = `<span class="bible-quote" data-book="${quote.book}" data-chapter="${quote.chapter}" data-verse="${quote.verse}" data-end-verse="${quote.endVerse || ''}"><strong>${quote.fullMatch}</strong> 📖</span>`;

        processedContent = beforeQuote + quoteHtml + afterQuote;
        offset += quoteHtml.length - quote.fullMatch.length;
      });

      return processedContent;
    }

    // Event listener para citações bíblicas
    document.addEventListener('click', async (e) => {
      if (e.target.classList.contains('bible-quote') || e.target.closest('.bible-quote')) {
        const quoteElement = e.target.classList.contains('bible-quote') ? e.target : e.target.closest('.bible-quote');
        const book = quoteElement.dataset.book;
        const chapter = quoteElement.dataset.chapter;
        const verse = quoteElement.dataset.verse;
        const endVerse = quoteElement.dataset.endVerse;

        // Mostrar modal de carregamento
        document.getElementById('bibleModalTitle').textContent = `${book} ${chapter}:${verse}${endVerse ? `-${endVerse}` : ''} (NVI)`;
        document.getElementById('bibleContent').innerHTML = '<p>Carregando texto bíblico...</p>';
        document.getElementById('bibleModal').classList.remove('hidden');

        // Buscar texto
        const bibleText = await fetchBibleText(book, chapter, verse, endVerse);
        document.getElementById('bibleContent').innerHTML = `<p>${bibleText}</p>`;
      }
    });

    // Fechar modal bíblico
    document.getElementById('bibleModalClose').addEventListener('click', () => {
      document.getElementById('bibleModal').classList.add('hidden');
    });

    window.addEventListener('click', (event) => {
      if (event.target == document.getElementById('bibleModal')) {
        document.getElementById('bibleModal').classList.add('hidden');
      }
    });
  </script>
</body>
</html>
